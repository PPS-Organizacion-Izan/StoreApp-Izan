version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: store
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secr3t
    ports:
      - "5432:5432"
  app:
    build: .
    depends_on:
      - db
    ports:
      - "8888:8888"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/store
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: secr3t
